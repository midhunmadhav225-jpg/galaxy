<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Assets Gallery — Galaxy</title>
  <style>
    body{font-family:Inter, Arial, sans-serif;background:#f7fafc;margin:0;padding:2rem}
    h1{color:#0f172a;margin-bottom:1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .card{background:#fff;border-radius:8px;padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.06);text-align:center}
    img{max-width:100%;height:160px;object-fit:cover;border-radius:4px}
    .meta{font-size:0.9rem;color:#475569;margin-top:0.5rem}
    a.home{display:inline-block;margin-bottom:1rem;color:#0ea5a4}
  </style>
</head>
<body>
  <a class="home" href="/">← Back to site</a>
  <h1>Assets Gallery</h1>
  <p>Placeholder images are shown here. Replace them by uploading real images into this folder.</p>
  <div class="grid">
    <div class="card">
      <img src="product-1.svg" alt="Product 1">
      <div class="meta">product-1.svg — placeholder (image 1)</div>
    </div>
    <div class="card">
      <img src="product-2.svg" alt="Product 2">
      <div class="meta">product-2.svg — placeholder (image 2)</div>
    </div>
    <div class="card">
      <img src="product-3.svg" alt="Product 3">
      <div class="meta">product-3.svg — placeholder (image 3)</div>
    </div>
    <div class="card">
      <img src="product-4.svg" alt="Product 4">
      <div class="meta">product-4.svg — placeholder (image 4)</div>
    </div>
  </div>
</body>
</html>
